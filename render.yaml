services:
  - type: web
    name: kmj-erp
    env: node
    buildCommand: PUPPETEER_SKIP_DOWNLOAD=false npm install && cd server && npx puppeteer browsers install chrome && cd .. && npm run build
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 20.18.0
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"
